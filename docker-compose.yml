services:

  # container do back glr, ports onde roda
  backend:
    build: ./backend
    container_name: gastos-backend
    ports:
      - "5000:5000"     
    environment:
      - PORT=5000
    volumes:
      - sqlite_data:/app
    restart: unless-stopped

  # container do front
  frontend:
    build: ./frontend
    container_name: gastos-frontend
    ports:
      - "8080:80"  # dps q subir, abrir na porta 8080, mas ja depende do back
    depends_on:
      - backend       
    restart: unless-stopped
volumes:
  sqlite_data: